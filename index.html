<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TypoStudio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      min-height: 100vh;
      padding: 40px 0 0;
      background: #e8e8e8;
      font-family: serif;
    }

    .header {
      width: min(1100px, calc(100vw - 40px));
      margin-bottom: 20px;
    }

    h3 {
      font-weight: 400;
      color: #333;
      margin: 0;
    }

    canvas {
      display: block;
    }

    footer {
      text-align: center;
      margin-top: 50px;
      padding-bottom: 20px;
      color: #888;
      font-size: 0.9em;
    }

    /* Responsive styles */
    @media (max-width: 1100px) {
      body {
        padding-top: 80px;
      }

      .header {
        text-align: center;
        width: 100%;
      }

      .frame-container {
        margin: 0 auto !important;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      footer {
        margin-top: 20px;
        padding-bottom: 20px;
      }
    }
  </style>
</head>

<body class="body-layout">
  <div class="header">
    <h3>TypoStudio</h3>
  </div >
  <div class="frame-container" style="position: relative; width: 1100px; margin: 0 auto; padding-bottom: 50px;">
    <canvas id="canvas"></canvas>
  </div >
  <script>
    // --- Global State ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const frames = [];
    const githubIcons = [];
    let mouse = { x: -1000, y: -1000 };
    let animationFrameId = null;
    const fonts = ["serif", "sans-serif", "monospace", "cursive", "fantasy"];
    const GITHUB_ICON_PATH = new Path2D("M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z");
    const githubLinks = {
      EINKCLOCK: "https://github.com/TypoStudio/einkclock",
      SSHTUNNELMANAGER: "https://github.com/TypoStudio/ssh-tunnel-for-macos",
      MATCHIT: "https://github.com/TypoStudio/matchit"
    };
    const projectLinks = {
      EINKCLOCK: "https://typostudio.github.io/einkclock/",
      MATCHIT: "https://typostudio.github.io/matchit/"
    };


    // --- Main Setup and Drawing Function ---
    function setupAndDraw() {
        if (animationFrameId) {
            cancelAnimationFrame(animationFrameId);
        }
        frames.length = 0; // Clear frames for redraw
        githubIcons.length = 0;

        // --- Layout Constants ---
        const dpr = window.devicePixelRatio || 1;
        const frameW = 300;
        const frameH = 400;
        const border = 18;
        const letterMargin = 12;
        const spacing = 40;
        const padding = 60;
        const rowGap = 88;       // 행 사이 간격 (github 아이콘 영역 포함)
        const bottomIconArea = 50;
        // 512 이하 1열, 1024 이하 2열, 초과 4열

        // --- Grid Layout ---
        const cols = window.innerWidth <= 512 ? 1 : window.innerWidth <= 1024 ? 2 : 4;
        const layout = ["EINKCLOCK", "TRIPBALL", "MATCHIT", "SSHTUNNELMANAGER"];
        const iconKeys = ["EINKCLOCK", "MATCHIT", "SSHTUNNELMANAGER"];
        const rows = Math.ceil(layout.length / cols);
        const cellX = i => padding + (i % cols) * (frameW + spacing);
        const cellY = i => padding + Math.floor(i / cols) * (frameH + rowGap);

        // --- Canvas Sizing ---
        const canvasWrapper = canvas.parentElement;
        const canvasW = frameW * cols + spacing * (cols - 1) + padding * 2;
        const canvasH = padding * 2 + frameH * rows + rowGap * (rows - 1) + bottomIconArea;

        // Scale display size down to fit viewport (internal resolution stays full)
        const availW = window.innerWidth - 40;
        const fitScale = canvasW > availW ? availW / canvasW : 1;
        const displayW = canvasW * fitScale;
        const displayH = canvasH * fitScale;

        canvasWrapper.style.width = displayW + 'px';
        canvasWrapper.style.paddingBottom = '0px';

        canvas.width = canvasW * dpr;
        canvas.height = canvasH * dpr;
        canvas.style.width = displayW + 'px';
        canvas.style.height = displayH + 'px';
        ctx.resetTransform();
        ctx.scale(dpr, dpr);
        
        // --- Initialize Frames ---
        layout.forEach((text, i) => initFrame(cellX(i), cellY(i), text, true));
        iconKeys.forEach(key => {
          const i = layout.indexOf(key);
          registerGithubIcon(cellX(i) + frameW / 2, cellY(i) + frameH + 28, key);
        });

        // --- Run Animation Loop ---
        animate(canvasW, canvasH);
    }
    
    function initFrame(fx, fy, text, isInteractive = false)
    {
      const frameW = 300, frameH = 400, border = 18, letterMargin = 12;
      const frame = { fx, fy, text, letters: [], isHovered: false, wasHovered: false, hoverStartTime: 0, mode: 0 };

      frame.drawStatic = () =>
      {
        ctx.save()
        ctx.shadowColor = 'rgba(0, 0, 0, 0.18)'; ctx.shadowBlur = 30;
        ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 6;
        ctx.fillStyle = '#f0f0f0'; ctx.fillRect(fx, fy, frameW, frameH);
        ctx.restore()
        ctx.fillStyle = '#f0f0f0'; ctx.fillRect(fx, fy, frameW, frameH);
        ctx.strokeStyle = 'rgba(0, 0, 0, 0.05)'; ctx.lineWidth = 1;
        ctx.strokeRect(fx + 0.5, fy + 0.5, frameW - 1, frameH - 1);
        ctx.fillStyle = '#ffffff'; ctx.fillRect(fx + border, fy + border, frameW - border * 2, frameH - border * 2);
        ctx.strokeStyle = 'rgba(0, 0, 0, 0.04)'; ctx.lineWidth = 0.5;
        ctx.strokeRect(fx + border, fy + border, frameW - border * 2, frameH - border * 2);
      }

      if (!text) { frames.push(frame); return; }

      const rawLetters = text.split("").map(l => Math.random() > 0.5 ? l.toUpperCase() : l.toLowerCase());
      const innerX = fx + border, innerY = fy + border;
      const innerW = frameW - border * 2, innerH = frameH - border * 2;
      const placed = [], verticalSegment = innerH / rawLetters.length;
      const extraBigIndex = Math.floor(Math.random() * rawLetters.length);
      const bigIndices = [];
      while (bigIndices.length < 2 && rawLetters.length > 3) {
        const r = Math.floor(Math.random() * rawLetters.length);
        if (r !== extraBigIndex && !bigIndices.includes(r)) bigIndices.push(r);
      }

      rawLetters.forEach((char, i) => {
        let fontSize = Math.floor(Math.random() * (verticalSegment * 0.5)) + 30;
        if (i === extraBigIndex) fontSize *= 3.5; else if (bigIndices.includes(i)) fontSize *= 2.0;

        const font = fonts[Math.floor(Math.random() * fonts.length)], radius = fontSize * 0.45;
        const segmentTop = innerY + (i * verticalSegment);
        let baseX, baseY, baseAngle, found = false, bestX, bestY, minOverlap = Infinity;

        for (let attempt = 0; attempt < 300; attempt++) {
          let tx = innerX + radius + Math.random() * (innerW - radius * 2);
          let ty = segmentTop + radius + Math.random() * (verticalSegment - radius * 2);
          tx = Math.max(innerX + radius + letterMargin, Math.min(tx, innerX + innerW - radius - letterMargin));
          ty = Math.max(innerY + radius + letterMargin, Math.min(ty, innerY + innerH - radius - letterMargin));
          let maxOverlap = 0, overlapCount = 0;
          for (const other of placed) {
            const dist = Math.sqrt((tx - other.x) ** 2 + (ty - other.y) ** 2);
            const overlap = (radius + other.radius) - dist;
            if (overlap > 0) { overlapCount++; maxOverlap = Math.max(maxOverlap, overlap); }
          }
          if (overlapCount === 0) { baseX = tx; baseY = ty; found = true; break; }
          if (maxOverlap < minOverlap) { minOverlap = maxOverlap; bestX = tx; bestY = ty; }
        }
        if (!found) { baseX = bestX; baseY = bestY; }
        placed.push({ x: baseX, y: baseY, radius });

        if (i === 0) baseAngle = 0;
        else {
          const confusingChars = "nupdbqIl1NZ690oO";
          if (confusingChars.includes(char)) baseAngle = (Math.random() > 0.5) ? 0 : Math.PI / 2;
          else baseAngle = [0, Math.PI / 2, Math.PI, Math.PI * .5][Math.floor(Math.random() * 4)];
        }

        let targetX = baseX, targetY = baseY;
        if (isInteractive) {
          if (text === "EINKCLOCK") {
            if (i < 4) { targetX = innerX + (innerW / 5) * (i + 1); targetY = innerY + innerH * 0.35; }
            else { targetX = innerX + (innerW / 6) * (i - 4 + 1); targetY = innerY + innerH * 0.65; }
          } else if (text === "TRIPBALL") {
            if (i < 4) { targetX = innerX + (innerW / 5) * (i + 1); targetY = innerY + innerH * 0.35; }
            else { targetX = innerX + (innerW / 5) * (i - 4 + 1); targetY = innerY + innerH * 0.65; }
          } else if (text === "MATCHIT") {
            if (i < 5) { targetX = innerX + (innerW / 6) * (i + 1); targetY = innerY + innerH * 0.35; }
            else { targetX = innerX + (innerW / 3) * (i - 5 + 1); targetY = innerY + innerH * 0.65; }
          } else if (text === "SSHTUNNELMANAGER") {
            if (i < 3) { targetX = innerX + (innerW / 4) * (i + 1); targetY = innerY + innerH * 0.25; }
            else if (i < 9) { targetX = innerX + (innerW / 7) * (i - 3 + 1); targetY = innerY + innerH * 0.5; }
            else { targetX = innerX + (innerW / 8) * (i - 9 + 1); targetY = innerY + innerH * 0.75; }
          }
        }
        frame.letters.push({ char, baseX, baseY, baseAngle, targetX, targetY, targetAngle: 0, currX: baseX, currY: baseY, currAngle: baseAngle, fontSize, font, index: i });
      });
      frames.push(frame);
    }

    function registerGithubIcon(x, y, projectKey) {
      githubIcons.push({
        x,
        y,
        size: 24,
        radius: 16,
        projectKey,
        href: githubLinks[projectKey]
      });
    }

    function getHoveredGithubIcon(x, y) {
      return githubIcons.find(icon => Math.hypot(x - icon.x, y - icon.y) <= icon.radius) || null;
    }

    function drawGithubIcon(icon, isHovered) {
      ctx.save();
      ctx.translate(icon.x - icon.size / 2, icon.y - icon.size / 2);
      ctx.scale(icon.size / 16, icon.size / 16);
      ctx.fillStyle = isHovered ? '#000000' : '#555555';
      ctx.fill(GITHUB_ICON_PATH);
      ctx.restore();
    }

    function animate(canvasW, canvasH) {
      const frameW = 300, frameH = 400, border = 18, letterMargin = 12;
      const now = Date.now();
      ctx.clearRect(0, 0, canvasW, canvasH);
      let cursorToSet = 'default';
      const hoveredGithubIcon = getHoveredGithubIcon(mouse.x, mouse.y);

      frames.forEach((frame, idx) => {
        frame.drawStatic();
        const isHovered = mouse.x >= frame.fx && mouse.x <= frame.fx + frameW && mouse.y >= frame.fy && mouse.y <= frame.fy + frameH;
        if (isHovered && (frame.text === "EINKCLOCK" || frame.text === "SSHTUNNELMANAGER" || frame.text === "MATCHIT")) { cursorToSet = 'pointer'; }

        if (isHovered && !frame.wasHovered) {
          frame.mode = (frame.mode + 1) % 2;
          frame.hoverStartTime = now;
        }
        if (!isHovered && frame.wasHovered) {
          const innerX = frame.fx + border, innerY = frame.fy + border;
          const innerW = frameW - border * 2, innerH = frameH - border * 2;
          const numLetters = frame.letters.length, verticalSegment = innerH / numLetters;
          const extraBigIndex = Math.floor(Math.random() * numLetters), bigIndices = [];
          while (bigIndices.length < 2 && numLetters > 3) {
            const r = Math.floor(Math.random() * numLetters);
            if (r !== extraBigIndex && !bigIndices.includes(r)) bigIndices.push(r);
          }
          frame.letters.forEach((l, i) => {
            let fontSize = Math.floor(Math.random() * (verticalSegment * 0.5)) + 30;
            if (i === extraBigIndex) fontSize *= 3.5; else if (bigIndices.includes(i)) fontSize *= 2.0;
            l.fontSize = fontSize;
            l.baseAngle = [0, Math.PI / 2, Math.PI, Math.PI * 1.5][Math.floor(Math.random() * 4)];
            l.char = Math.random() > 0.5 ? l.char.toUpperCase() : l.char.toLowerCase();
            l.font = fonts[Math.floor(Math.random() * fonts.length)];
          });
          const sortedLetters = [...frame.letters].sort((a, b) => b.fontSize - a.fontSize);
          const newlyPlaced = [];
          sortedLetters.forEach(l => {
            const radius = l.fontSize * 0.45;
            let baseX, baseY, found = false, bestX, bestY, minOverlap = Infinity;
            for (let attempt = 0; attempt < 200; attempt++) {
              let tx = innerX + radius + Math.random() * (innerW - radius * 2);
              let ty = innerY + radius + Math.random() * (innerH - radius * 2);
              tx = Math.max(innerX + radius + letterMargin, Math.min(tx, innerX + innerW - radius - letterMargin));
              ty = Math.max(innerY + radius + letterMargin, Math.min(ty, innerY + innerH - radius - letterMargin));
              let maxOverlap = 0, overlapCount = 0;
              for (const other of newlyPlaced) {
                const dist = Math.sqrt((tx - other.x) ** 2 + (ty - other.y) ** 2);
                if ((radius + other.radius) - dist > 0) { overlapCount++; maxOverlap = Math.max(maxOverlap, (radius + other.radius) - dist); }
              }
              if (overlapCount === 0) { baseX = tx; baseY = ty; found = true; break; }
              if (maxOverlap < minOverlap) { minOverlap = maxOverlap; bestX = tx; bestY = ty; }
            }
            if (!found) { baseX = bestX; baseY = bestY; }
            l.baseX = baseX; l.baseY = baseY;
            newlyPlaced.push({ x: baseX, y: baseY, radius });
          });
        }
        frame.wasHovered = isHovered;

        frame.letters.forEach(l => {
          let tx, ty, ta, alpha = 1;
          const staggerDelay = 100, elapsed = now - frame.hoverStartTime;
          if (isHovered) {
            if (frame.mode === 0) {
              tx = l.targetX; ty = l.targetY; ta = l.targetAngle; alpha = 1;
              l.currX += (tx - l.currX) * 0.12; l.currY += (ty - l.currY) * 0.12;
              let diff = ta - l.currAngle;
              while (diff > Math.PI) diff -= Math.PI * 2; while (diff < -Math.PI) diff += Math.PI * 2;
              l.currAngle += diff * 0.12;
            } else {
              const targetTime = l.index * staggerDelay;
              if (elapsed > targetTime) {
                l.currX = l.targetX; l.currY = l.targetY; l.currAngle = l.targetAngle;
                alpha = Math.min(1, (elapsed - targetTime) / 200);
              } else {
                l.currX = l.baseX; l.currY = l.baseY; l.currAngle = l.baseAngle;
              }
            }
          } else {
            tx = l.baseX; ty = l.baseY; ta = l.baseAngle; alpha = 1;
            l.currX += (tx - l.currX) * 0.12; l.currY += (ty - l.currY) * 0.12;
            let diff = ta - l.currAngle;
            while (diff > Math.PI) diff -= Math.PI * 2; while (diff < -Math.PI) diff += Math.PI * 2;
            l.currAngle += diff * 0.12;
          }
          if (alpha > 0) {
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.font = `bold ${l.fontSize}px ${l.font}`;
            ctx.fillStyle = '#000000';
            ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
            ctx.translate(l.currX, l.currY); ctx.rotate(l.currAngle);
            ctx.fillText(l.char, 0, 0);
            ctx.restore();
          }
        });
      });
      githubIcons.forEach(icon => drawGithubIcon(icon, hoveredGithubIcon === icon));
      if (hoveredGithubIcon) {
        cursorToSet = 'pointer';
      }
      canvas.style.cursor = cursorToSet;
      animationFrameId = requestAnimationFrame(() => animate(canvasW, canvasH));
    }

    // --- Event Listeners ---
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const canvasCurrentW = canvas.width / (window.devicePixelRatio || 1);
        const canvasCurrentH = canvas.height / (window.devicePixelRatio || 1);
        mouse.x = (e.clientX - rect.left) * (canvasCurrentW / rect.width);
        mouse.y = (e.clientY - rect.top) * (canvasCurrentH / rect.height);
    });
    canvas.addEventListener('mouseleave', () => { mouse.x = -1000; mouse.y = -1000; });
    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const canvasCurrentW = canvas.width / (window.devicePixelRatio || 1);
      const canvasCurrentH = canvas.height / (window.devicePixelRatio || 1);
      const clickX = (e.clientX - rect.left) * (canvasCurrentW / rect.width);
      const clickY = (e.clientY - rect.top) * (canvasCurrentH / rect.height);
      const clickedGithubIcon = getHoveredGithubIcon(clickX, clickY);

      if (clickedGithubIcon) {
        window.open(clickedGithubIcon.href, "_blank");
        return;
      }

      frames.forEach(frame => {
        const frameW = 300, frameH = 400;
        if (clickX >= frame.fx && clickX <= frame.fx + frameW && clickY >= frame.fy && clickY <= frame.fy + frameH) {
          if (projectLinks[frame.text]) {
            window.open(projectLinks[frame.text], "_blank");
          }
        }
      });
    });

    // --- Initial Load and Resize ---
    window.addEventListener('resize', setupAndDraw);
    setupAndDraw(); // Initial call
  </script>
  <footer class="footer-content">
    <p>&copy; 2026 TypoStudio. All rights reserved.</p>
  </footer>
</body >
